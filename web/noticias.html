<script>
// Mini-render de markdown -> HTML (titulares, negrita, cursiva, listas, pĂĄrrafos).
function md(t){
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inl = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^*])\*(?!\*)(.+?)\*/g,"$1<em>$2</em>")
    .replace(/`(.+?)`/g,"<code>$1</code>");
  const out=[]; let lista=null;
  for(let raw of (t||"").split("\n")){
    const line=raw.trim();
    if(!line){ if(lista){out.push("</ul>");lista=null;} continue; }
    let m;
    if(m=line.match(/^###?\s+(.*)/)){ if(lista){out.push("</ul>");lista=null;} out.push(`<h3>${inl(m[1])}</h3>`); }
    else if(m=line.match(/^[-*]\s+(.*)/)){ if(!lista){out.push('<ul>');lista=1;} out.push(`<li>${inl(m[1])}</li>`); }
    else { if(lista){out.push("</ul>");lista=null;} out.push(`<p>${inl(line)}</p>`); }
  }
  if(lista)out.push("</ul>");
  return out.join("");
}

async function getNoticias(){
  try{ const r=await fetch("noticias.json?_="+Date.now()); if(!r.ok)return {articulos:[]}; return await r.json(); }
  catch(e){ return {articulos:[]}; }
}

function fechaLarga(f){
  try{ return new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"long"}); }catch(e){ return f; }
}

function render(d, noti){
  pintarMeta(d);
  const arts=(noti.articulos||[]).slice().sort((a,b)=>(a.fecha<b.fecha?1:-1)); // mĂĄs reciente arriba
  if(!arts.length){ $("#view").innerHTML=`<div class="sec">Noticias</div><p style="color:var(--mut)">AĂșn no hay crĂłnicas. Las primeras caen al cerrar cada ronda. đ</p>`; return; }
  $("#view").innerHTML = arts.map((a,i)=>`
    <article class="noti${i===0?' nfresh':''}">
      <div class="ntag"><span class="nfase">${a.fase}</span><span class="bul"></span><span class="ndate">${fechaLarga(a.fecha)}</span>${i===0?'<span class="nnew">ĂLTIMA HORA</span>':''}</div>
      <h2 class="ntit">${a.titulo}</h2>
      <div class="nbody">${md(a.cuerpo)}</div>
    </article>`).join("");
}

(async ()=>{
  const [d, noti] = await Promise.all([getData(), getNoticias()]);
  render(d, noti);
  const f=$("#foot"); if(f) f.innerHTML="CrĂłnicas generadas con Claude Â· datos reales de la porra<br>Roast incluido sin coste adicional đ„";
})();
</script>
