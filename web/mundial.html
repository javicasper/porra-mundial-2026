<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>El Mundial · Resultados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="yr">Mundial 2026</div>
    <h1>La Porra</h1>
    <div class="sub" id="meta"></div>
  </div>
  <nav class="switch">
    <a href="index.html">Clasificación</a>
    <a href="mundial.html" class="on">Resultados</a>
    <a href="noticias.html">Noticias</a>
  </nav>

  <div id="view"></div>
  <footer id="foot"></footer>
</div>

<script src="assets/app.js"></script>
<script>
const RONDAS = ["Dieciseisavos","Octavos","Cuartos","Semifinales","3er puesto","Final"];
let CALF = "proximos";

/* --- tablas de grupos --- */
function grupos(d){
  const G = d.tablas_grupos;
  const cards = Object.keys(G).map(g=>{
    const filas = G[g].map(r=>{
      const cls = r.pos<=2 ? "q" : (r.pos===3 ? "q3" : "");
      return `<tr class="${cls}">
        <td class="tm"><span class="pos">${r.pos}</span><span class="fl">${fl(r.team)}</span><span class="nm">${r.team}</span></td>
        <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
        <td class="wide">${r.gf}</td><td class="wide">${r.gc}</td>
        <td>${r.dg>0?"+"+r.dg:r.dg}</td><td class="pts">${r.pts}</td>
        <td class="wide form">${(r.form||[]).map(f=>`<span class="fdot f${f}"></span>`).join("")}</td></tr>`;
    }).join("");
    return `<div class="gt"><div class="gh">Grupo ${g}</div>
      <table>
        <thead><tr><th class="l">Selección</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
          <th class="wide">GF</th><th class="wide">GC</th><th>DG</th><th>Pts</th><th class="wide">Forma</th></tr></thead>
        <tbody>${filas}</tbody></table></div>`;
  }).join("");
  return `<div class="sec">Fase de grupos</div>
    <div class="glegend">
      <span class="d"><span class="sw" style="background:var(--accent)"></span>Clasifican (1.º y 2.º)</span>
      <span class="d"><span class="sw" style="background:var(--lead)"></span>3.º · repesca (mejores terceros)</span></div>
    <div class="ggrid">${cards}</div>`;
}

/* --- cuadro de cruces (árbol oficial 2026, mismo layout que la ficha) --- */
/* Estructura fija del cuadro: winLabel -> [feeder1, feeder2, utc]. Los feeders
   son posición de grupo (R32) o "W##"/"L##" (ganador/perdedor de ese partido).
   Los utc coinciden con los de la API, así que cada casilla casa con su partido
   real por la hora de inicio. */
const BR = {
  W73:["2A","2B","2026-06-28T19:00:00Z"], W74:["1F","2C","2026-06-29T20:30:00Z"],
  W75:["1C","2F","2026-06-30T01:00:00Z"], W76:["1E","3ABCDF","2026-06-29T17:00:00Z"],
  W77:["2E","2I","2026-06-30T21:00:00Z"], W78:["1I","3CDFGH","2026-06-30T17:00:00Z"],
  W79:["1A","3CEFHI","2026-07-01T01:00:00Z"], W80:["1L","3EHIJK","2026-07-01T16:00:00Z"],
  W81:["1G","3AEHIJ","2026-07-02T00:00:00Z"], W82:["1D","3BEFIJ","2026-07-01T20:00:00Z"],
  W83:["1H","2J","2026-07-02T23:00:00Z"], W84:["2K","2L","2026-07-02T19:00:00Z"],
  W85:["1B","3EFGIJ","2026-07-03T03:00:00Z"], W86:["1K","3DEIJL","2026-07-03T22:00:00Z"],
  W87:["2D","2G","2026-07-04T01:30:00Z"], W88:["1J","2H","2026-07-03T18:00:00Z"],
  W89:["W73","W75","2026-07-04T21:00:00Z"], W90:["W74","W77","2026-07-04T17:00:00Z"],
  W91:["W76","W78","2026-07-05T20:00:00Z"], W92:["W79","W80","2026-07-06T00:00:00Z"],
  W93:["W83","W84","2026-07-06T19:00:00Z"], W94:["W81","W82","2026-07-07T00:00:00Z"],
  W95:["W86","W88","2026-07-07T16:00:00Z"], W96:["W85","W87","2026-07-07T20:00:00Z"],
  W97:["W89","W90","2026-07-09T20:00:00Z"], W98:["W93","W94","2026-07-10T19:00:00Z"],
  W99:["W91","W92","2026-07-11T21:00:00Z"], W100:["W95","W96","2026-07-12T01:00:00Z"],
  W101:["W97","W98","2026-07-14T19:00:00Z"], W102:["W99","W100","2026-07-15T19:00:00Z"],
  W103:["L101","L102","2026-07-18T21:00:00Z"], W104:["W101","W102","2026-07-19T19:00:00Z"],
};
function flbl(f){            // etiqueta legible de un feeder cuando aún no hay equipo
  if(!f) return "Por definir";
  if(f[0]==="W") return "Ganador "+f.slice(1);
  if(f[0]==="L") return "Perdedor "+f.slice(1);
  const g=f.slice(1);
  return f[0]+".º "+(g.length===1?g:"("+g+")");
}
function crBox(win, putc, proy){
  const n=BR[win]; const real=putc[(n[2])]; const pj=proy&&proy[n[2]];
  const row=(name,g,w,team,prov)=>`<div class="bx-row ${w?'w':''}${prov?' prov':''}"><span class="fl">${team?fl(team):""}</span><span class="bx-nm">${name}</span><span class="bx-sc">${g!=null?g:""}</span></div>`;
  let r1,r2,foot,cls="";
  if(real && real.local && real.visitante){     // equipos reales: SOLO si están los dos (no parcial)
    const show=real.jugado||real.envivo;
    const hw=real.jugado&&real.golesLocal>real.golesVisitante, aw=real.jugado&&real.golesVisitante>real.golesLocal;
    r1=row(real.local, show?real.golesLocal:null, hw, real.local);
    r2=row(real.visitante, show?real.golesVisitante:null, aw, real.visitante);
    foot = real.jugado ? `<div class="bx-t">FINAL</div>` : (real.envivo?`<div class="bx-t lv">● ${liveMinute(real)}</div>`:`<div class="bx-t">${fechaCorta(n[2])} · ${hora(n[2])}</div>`);
  }else if(pj && !R32_DRAWN){                    // proyección (solo antes del sorteo real): lado fijo normal, dudoso dorado
    const lp=!pj.localFijo, vp=!pj.visitanteFijo, dud=lp||vp;
    cls = dud ? " prov" : "";
    r1=row(pj.local,null,false,pj.local,lp);
    r2=row(pj.visitante,null,false,pj.visitante,vp);
    foot = `<div class="bx-t${dud?' prov':''}">${fechaCorta(n[2])} · ${hora(n[2])}</div>`;
  }else{                                         // esqueleto: feeders + hora
    r1=row(flbl(n[0]),null,false,null);
    r2=row(flbl(n[1]),null,false,null);
    foot=`<div class="bx-t">${fechaCorta(n[2])} · ${hora(n[2])}</div>`;
  }
  return `<div class="bx-tie${cls}">${r1}${r2}${foot}</div>`;
}
function cruces(d){
  const proy=d.proyeccion||{};
  const putc={}; d.partidos.forEach(p=>{ if(p.fase!=="Grupos"&&p.utc) putc[p.utc]=p; });
  const node=w=>{ const n=BR[w]; const kids=[n[0],n[1]].filter(f=>BR[f]); return {w, kids:kids.length?kids.map(node):null}; };
  const rn=(x,side)=>`<div class="bnode ${side}"><div class="bself">${crBox(x.w,putc,proy)}</div>${x.kids?`<div class="bkids">${x.kids.map(k=>rn(k,side)).join("")}</div>`:""}</div>`;
  const banner = Object.keys(proy).length
    ? `<div class="provbar"><b>Proyección provisional</b> de los dieciseisavos según la clasificación actual (1.º y 2.º de cada grupo + los 8 mejores terceros). Cambia con cada resultado y se fija al terminar los grupos.</div>` : "";
  return `<div class="sec">Cuadro de cruces <span class="hint">desliza →</span></div>${banner}
    <div class="bkwrap"><div class="bktree">
      ${rn(node("W101"),"left")}
      <div class="bkfinal"><div class="bkfl">Final</div>${crBox("W104",putc,proy)}
        <div class="bkfl" style="margin-top:8px">3.º y 4.º</div>${crBox("W103",putc,proy)}</div>
      ${rn(node("W102"),"right")}
    </div></div>`;
}

/* --- resultados / calendario --- */
function wc(p,s){ if(!p.jugado||p.golesLocal===p.golesVisitante) return ""; const hw=p.golesLocal>p.golesVisitante; return (s==="h"?hw:!hw)?"win":""; }
function box(p){
  if(p.status==="IN_PLAY"||p.status==="PAUSED") return `<div class="bx2" data-live="${liveKey(p)}"><div class="s">${p.golesLocal}-${p.golesVisitante}</div><div class="lv">● ${liveMinute(p)}</div></div>`;
  if(p.jugado) return `<div class="bx2"><div class="s">${p.golesLocal}-${p.golesVisitante}</div><div class="ft">FINAL</div></div>`;
  return `<div class="bx2"><div class="t">${hora(p.utc)}</div></div>`;
}
function matchRow(p, withPreds){
  // Cruces de KO sin equipos reales aún: rellenar con la proyección provisional (por hora)
  // Un cruce KO es "real" solo con LOS DOS equipos puestos. Si la API solo ha
  // asignado uno (lo va haciendo a trozos al cerrar grupos), ignoramos ese parcial
  // y usamos la proyección, que es consistente (si no, salía "X vs Por definir" y bailaba).
  const fullReal = !!(p.local && p.visitante);
  const proj = (!fullReal && !R32_DRAWN && PROY[p.utc]) ? PROY[p.utc] : null;
  const loc = fullReal ? p.local : (proj ? proj.local : (p.local || "Por definir"));
  const vis = fullReal ? p.visitante : (proj ? proj.visitante : (p.visitante || "Por definir"));
  // dorado solo en el lado de la proyección que aún NO es fijo (grupo sin acabar / mejor tercero)
  const locProv = proj && !proj.localFijo ? " prov" : "";
  const visProv = proj && !proj.visitanteFijo ? " prov" : "";
  const dudoso = proj && (!proj.localFijo || !proj.visitanteFijo);
  const tag = p.grupo ? ("Grupo "+p.grupo+(p.jornada?" · Jornada "+p.jornada:"")) : (p.fase + (dudoso?" · proyección":""));
  const pk = withPreds ? panelKeyFor(p) : null;
  const has = !!pk;
  const open = has && !!_predsOpen[pk];
  const chev = has ? `<span class="pchev" aria-hidden="true">›</span>` : "";
  return `<div class="mt${has?' clk':''}${open?' on':''}"${has?` data-pk="${pk}"`:""}>
    <div class="th ${wc(p,'h')}${locProv}">${loc}<span class="fl">${fl(loc)}</span></div>
    ${box(p)}
    <div class="ta ${wc(p,'a')}${visProv}"><span class="fl">${fl(vis)}</span>${vis}</div>
    <div class="tag"><span>${tag}</span>${chev}</div></div>`;
}

/* --- pronósticos por partido (todos los participantes) --- */
let PREDIDX = {};            // grupos: pkey -> [{nombre, local, visitante, pred, pts, tier}]
let PKO = {};                // KO: fase -> pkey -> {nombre -> {home,away,hteam,pts,tier}}
let ALLPART = [];            // nombres de participantes (orden de ranking)
let PROY = {};               // utc -> {local, visitante}: proyección provisional de dieciseisavos
let R32_DRAWN = false;        // la API ya empezó a sortear dieciseisavos -> mandan sus equipos reales
const _predsOpen = {};       // clave -> ¿panel desplegado? (sobrevive a re-render)
const _KORONDAS = [["cruces_dieciseisavos","Dieciseisavos"],["cruces_octavos","Octavos"],
                   ["cruces_cuartos","Cuartos"],["cruces_semis","Semifinales"]];
function buildPredIndex(d){
  PROY = d.proyeccion || {};
  // Cuando la API empieza a poner equipos reales en dieciseisavos, su calendario manda
  // (mis horas de proyección son del Excel y ya no cuadran). Dejamos de proyectar.
  R32_DRAWN = (d.partidos||[]).some(p=>p.fase==="Dieciseisavos" && (p.local||p.visitante));
  ALLPART = (d.ranking||[]).map(r=>r.nombre);
  PREDIDX = {}; PKO = {};
  Object.values(d.participantes||{}).forEach(P=>{
    (P.grupos||[]).forEach(g=>{
      const k = pkey(g.local, g.visitante);
      (PREDIDX[k] = PREDIDX[k] || []).push(
        {nombre:P.nombre, local:g.local, visitante:g.visitante, pred:g.pred, pts:g.pts, tier:g.tier});
    });
    // cruces de KO: indexados por pareja de equipos (cada uno pudo poner equipos distintos)
    _KORONDAS.forEach(([key,fase])=>{
      (P[key]||[]).forEach(c=>{
        if(!c || !c.match) return;
        const [ta,tb] = c.match.split("-").map(s=>s.trim());
        const k = pkey(ta, tb);
        ((PKO[fase] = PKO[fase]||{})[k] = PKO[fase][k]||{})[P.nombre] =
          {home:c.pred&&c.pred.home, away:c.pred&&c.pred.away, hteam:ta, pts:c.pts, tier:c.tier};
      });
    });
  });
}
// Clave del panel de pronósticos de un partido (o null si no hay que mostrarlo).
function panelKeyFor(p){
  if(p.grupo){ const k=pkey(p.local,p.visitante); return (PREDIDX[k]&&PREDIDX[k].length)?k:null; }
  if(p.local && p.visitante && PKO[p.fase]){     // cruce KO definido al 100% (ambos equipos reales)
    const k=pkey(p.local,p.visitante), m=PKO[p.fase][k];
    return (m && Object.keys(m).length) ? (p.fase+"|"+k) : null;
  }
  return null;
}
// Puntos provisionales de un partido EN JUEGO (reglas de grupos), calculados en
// cliente contra el marcador en vivo. Los finalizados ya vienen puntuados del motor.
function _liveTier(ph, pa, gl, gv){
  if(ph==null || pa==null || gl==null || gv==null) return {tier:null, pts:0};
  const sp = ph>pa?1:(pa>ph?2:0), sr = gl>gv?1:(gv>gl?2:0);
  if(ph===gl && pa===gv) return {tier:"exacto", pts:5};
  if(sp===sr && (ph-pa)===(gl-gv)) return {tier:"diferencia", pts:2};
  if(sp===sr) return {tier:"signo", pts:1};
  return {tier:null, pts:0};
}
function predsPanel(p){
  const kk = panelKeyFor(p); if(!kk) return "";
  const visto = p.jugado || p.envivo;
  const ko = !p.grupo;
  const TC = {exacto:"b5", diferencia:"b2", signo:"b1"};
  const tierLive = (h,a)=>{ const r=_liveTier(h,a,p.golesLocal,p.golesVisitante); return {pts:r.pts, tier:r.tier}; };
  let rows;
  if(!ko){                                  // GRUPOS: todos pronosticaron el mismo partido
    rows = PREDIDX[pkey(p.local,p.visitante)].map(x=>{
      let h = x.pred&&x.pred.home, a = x.pred&&x.pred.away;
      if(x.pred && _norm(x.local) !== _norm(p.local)){ const t=h; h=a; a=t; }
      let pts=null, tier=null;
      if(p.jugado){ pts=x.pts; tier=x.tier; } else if(p.envivo){ ({pts,tier}=tierLive(h,a)); }
      return {nombre:x.nombre, sc:x.pred?`${h}-${a}`:"—", pts, tier, has:true};
    });
  } else {                                  // KO: por EQUIPOS; quien no puso este cruce, "—"
    const byName = PKO[p.fase][pkey(p.local,p.visitante)] || {};
    rows = ALLPART.map(nombre=>{
      const e = byName[nombre];
      if(!e || e.home==null) return {nombre, sc:"—", pts:null, tier:null, has:false};
      let h=e.home, a=e.away;
      if(_norm(e.hteam) !== _norm(p.local)){ const t=h; h=a; a=t; }   // orientar al cruce real
      let pts=null, tier=null;
      if(p.jugado){ pts=e.pts; tier=e.tier; } else if(p.envivo){ ({pts,tier}=tierLive(h,a)); }
      return {nombre, sc:`${h}-${a}`, pts, tier, has:true};
    });
  }
  rows.sort((a,b)=>{
    if(a.has!==b.has) return a.has ? -1 : 1;                          // los que tenían el cruce, arriba
    if(visto && a.has) return ((b.pts||0)-(a.pts||0)) || a.nombre.localeCompare(b.nombre);
    return a.nombre.localeCompare(b.nombre);
  });
  const chips = rows.map(x=>{
    const bdg = (visto && x.has) ? `<span class="bdg ${TC[x.tier]||'b0'}">${x.pts>0?"+"+x.pts:x.pts}</span>` : "";
    return `<div class="prc${x.has?'':' nope'}"><span class="pn">${x.nombre}</span><span class="ps">${x.sc}</span>${bdg}</div>`;
  }).join("");
  const leg = visto ? `<div class="prleg">${p.envivo?'<b class="prov">Provisional</b>':''}<span class="bdg b5">5</span>clavado<span class="bdg b2">2</span>dif.<span class="bdg b1">1</span>signo<span class="bdg b0">0</span>fallo</div>` : "";
  const note = ko ? `<div class="prnote">${rows.filter(r=>r.has).length}/${ALLPART.length} acertaron el cruce (los demás pusieron otros equipos)</div>` : "";
  return `<div class="preds${_predsOpen[kk]?' open':''}" data-pk="${kk}">${leg}${note}<div class="prgrid">${chips}</div></div>`;
}
function matchBlock(p){ return matchRow(p, true) + predsPanel(p); }

function liveSection(d){
  const live = d.partidos.filter(p=>p.envivo).sort((a,b)=>(a.utc||"")<(b.utc||"")?-1:1);
  if(!live.length) return "";
  return `<div class="card livecard">${live.map(p=>matchRow(p,true)+predsPanel(p)+evlistHTML(p)).join("")}</div>`;
}

function resultados(d){
  let ps = d.partidos.slice();
  if(CALF==="jugados") ps=ps.filter(p=>p.jugado);
  else if(CALF==="proximos") ps=ps.filter(p=>!p.jugado && !p.envivo);
  const desc = CALF==="jugados";          // jugados: más recientes primero
  const g={}; ps.forEach(p=>(g[diaKey(p.utc)]=g[diaKey(p.utc)]||[]).push(p));
  let keys=Object.keys(g).sort(); if(desc) keys.reverse();
  const body=keys.map(k=>{
    const arr=g[k].sort((a,b)=>{const r=(a.utc||"")<(b.utc||"")?-1:1; return desc?-r:r;});
    return `<div><div class="day">${diaLbl(arr[0].utc)}</div>${arr.map(matchBlock).join("")}</div>`;
  }).join("");
  const f=x=>`<div class="fbtn ${CALF===x?'on':''}" data-f="${x}">${{jugados:"Jugados",proximos:"Próximos",todos:"Todos"}[x]}</div>`;
  return `<div class="sec">Resultados y calendario</div>
    <div class="fbar">${f("proximos")}${f("jugados")}${f("todos")}</div>
    ${body||'<div style="padding:14px 2px;color:var(--mut)">Sin partidos.</div>'}`;
}

function goleadores(d){
  const g = d.goleadores || [];
  if(!g.length) return "";
  const rows = g.map(s=>`<div class="srow ${s.pos===1?'sgold':''}">
    <div class="srk">${s.pos}</div>
    <div class="sn"><div class="nm2"><span class="fl">${fl(s.equipo)}</span><span>${s.jugador}</span></div>
      <div class="tm2">${s.equipo}${s.asistencias?` · ${s.asistencias} asist.`:""}${s.penaltis?` · ${s.penaltis} pen.`:""}</div></div>
    <div class="sg">${s.goles}</div></div>`).join("");
  return `<div class="sec">Goleadores <span class="hint">Bota de Oro</span></div>
    <div class="card"><div class="shead"><div></div><div>Jugador</div><div class="r">Goles</div></div>${rows}</div>`;
}

function render(d){
  buildPredIndex(d);
  $("#view").innerHTML = liveSection(d) + resultados(d) + grupos(d) + goleadores(d) + cruces(d);
  document.querySelectorAll(".fbtn").forEach(b=>b.addEventListener("click",()=>{
    CALF=b.dataset.f; render(d);
  }));
}

// Toggle de pronósticos por partido (delegado: sobrevive a re-render y filtros).
document.addEventListener("click", ev=>{
  const row = ev.target.closest(".mt.clk"); if(!row) return;
  const k = row.dataset.pk; if(!k) return;
  _predsOpen[k] = !_predsOpen[k];
  row.classList.toggle("on", _predsOpen[k]);
  const pn = row.nextElementSibling;
  if(pn && pn.classList.contains("preds") && pn.dataset.pk===k) pn.classList.toggle("open", _predsOpen[k]);
});
iniciar(render);
</script>
</body>
</html>
