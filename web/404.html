<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>404 · This is not your GOAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* --paper igualado al fondo crema de la imagen de las cabras, para que se funda sin costura */
  :root{ --paper:#f2e8d9; --card:#fffefb; --ink:#15161b; --mut:#8a7f6e; --mut2:#b3a892;
    --hair:#e6e4db; --accent:#1d6b4c;
    --serif:"Fraunces",Georgia,"Times New Roman",serif; --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:32px 20px calc(40px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;width:100%}
  .yr{font-size:.7rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--mut)}
  .code{font-family:var(--serif);font-weight:600;font-size:clamp(3.5rem,18vw,6rem);line-height:.9;letter-spacing:-.02em;margin:6px 0 2px}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.6rem,7vw,2.4rem);line-height:1.05;margin:8px 0 0}
  h1 .goat{color:var(--accent)}
  .sub{color:var(--mut);font-size:.95rem;margin:14px auto 0;max-width:34ch;line-height:1.5}
  .art{margin:26px auto 8px;max-width:520px}
  .art img{display:block;width:100%;height:auto}
  .fallback{font-size:clamp(2.6rem,12vw,4rem);line-height:1.3;letter-spacing:.06em}
  .fallback .flags{display:block;font-size:.5em;margin-top:6px;letter-spacing:.12em}
  .btn{display:inline-block;margin-top:26px;background:var(--ink);color:#fff;text-decoration:none;
    font-weight:600;font-size:.92rem;padding:12px 22px;border-radius:11px}
  .btn:hover{background:var(--accent)}
  .foot{margin-top:22px;color:var(--mut2);font-size:.72rem}
</style>
</head>
<body>
  <div class="wrap">
    <div class="yr">Mundial 2026 · La Porra</div>
    <div class="code">404</div>
    <h1>This is not your <span class="goat">GOAT</span> 🐐</h1>
    <p class="sub">Esta página se ha escapado al monte. El cabra que buscas no está aquí… pero el Mundial sí.</p>

    <div class="art">
      <!-- Sustituye assets/goat404.png por la imagen generada. Si no existe, salen los emojis. -->
      <img src="assets/goat404.png" alt="Los GOATs del Mundial, en versión cabra"
           onerror="this.style.display='none';document.getElementById('fb').style.display='block'">
      <div id="fb" class="fallback" style="display:none">
        🐐⚽🐐🥅🐐
        <span class="flags">🇪🇸 🇵🇹 🇦🇷 🇫🇷 🇳🇴</span>
      </div>
    </div>

    <a class="btn" href="/">← Volver a la porra</a>
    <div class="foot">porra.javicasper.com</div>
  </div>
</body>
</html>
