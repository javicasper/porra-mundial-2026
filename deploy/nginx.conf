server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No indexar / no rastrear (porra privada de oficina)
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # SPA-ish: las dos páginas son ficheros reales
    location / {
        try_files $uri $uri/ =404;
    }

    # data.json siempre fresco (lo regenera el refresher)
    location = /data.json {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # css/js: revalidar siempre (304 baratos) para que los cambios entren al momento
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # banderas SVG: cache larga (no cambian)
    location /assets/flags/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
