server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No indexar / no rastrear (porra privada de oficina)
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # SPA-ish: las dos páginas son ficheros reales.
    # no-cache: el navegador revalida siempre (304 barato) -> nunca sirve HTML viejo.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Página 404 personalizada ("this is not your goat" 🐐)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # data.json siempre fresco (lo regenera el refresher)
    location = /data.json {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # css/js: revalidar siempre (304 baratos) para que los cambios entren al momento
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # banderas SVG: cache larga (no cambian)
    location /assets/flags/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
